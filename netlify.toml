# Static HTML site — no npm/build step required.
# Netlify UI: leave Build command empty, Publish directory = "." (or blank; this file wins).
[build]
  publish = "."
  command = ""

# Netlify automatically serves 404.html for missing pages.
# Custom domain setup (Netlify Dashboard > Domain management):
# 1. Add domain: www.vivekanandacbseschools.com (or your domain)
# 2. At your domain registrar, set DNS to Netlify:
#    - Apex (@): A record -> 75.2.60.5
#    - www: CNAME -> <your-site>.netlify.app
# 3. Wait for DNS, then enable HTTPS (Netlify provisions SSL automatically)

# Redirect .html URLs to clean paths (browser shows URL without .html)
[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/about.html"
  to = "/about"
  status = 301
  force = true

[[redirects]]
